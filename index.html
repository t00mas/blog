---
layout: default
---
<strong>[POSTS]</strong>
<ul class="post-list">
{% assign posts = site.posts | where: "lang", site.active_lang %}
{% for post in posts %}
  <li><span class="date">{{ post.date | date: "%Y-%m-%d" }}</span> <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></li>
{% endfor %}
</ul>
